kind = "web"
previewPath = "/"
title = "SmartPay AI"
version = "1.0.0"
id = "artifacts/smartpay-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25056
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/smartpay-ai run dev"

[services.env]
PORT = "25056"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/smartpay-ai", "run", "build"]
publicDir = "artifacts/smartpay-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
